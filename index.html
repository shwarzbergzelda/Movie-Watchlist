<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Film</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <header>
        <img src="./images/header.webp" alt="framed movie banners hanging on a wall">
        <nav>
            <h1 id="page-title">Find your film</h1>
            <a id="nav-link" href="watchlist.html">My Watchlist</a>
        </nav>
    </header>

    
    <!-- Main Content -->
    <main>

        <!-- Search Form -->

        <form id="search-form" class="search-form">
            <div class="input-wrapper">
                <img src="./images/search.png">
                <input id="search-input" type="text" placeholder="Search for a movie" name="search-input">
            </div>
            <button>Search</button>
        </form>

        <!-- Movies Section -->
        <section class="movies-container" id="movies-container">
            <img class="movie-reel-icon" src="./images/movie-icon.png" alt="movie reel icon">
            <h2 class="explore-header">Start exploring</h2>
        </section>

    </main>

    <script src="index.js"></script>
</body>
</html>
